<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <!-- Night room / framed scene background -->
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="0.55" stop-color="#080b16"/>
      <stop offset="1" stop-color="#05070f"/>
    </linearGradient>

    <!-- Desk surface, slightly from above -->
    <linearGradient id="deskTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d29"/>
      <stop offset="1" stop-color="#12141d"/>
    </linearGradient>
    <linearGradient id="deskFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1017"/>
      <stop offset="1" stop-color="#080a10"/>
    </linearGradient>

    <!-- Monitor bezels -->
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252a38"/>
      <stop offset="1" stop-color="#141824"/>
    </linearGradient>

    <!-- Left monitor: ordinary, cold/neutral code editor -->
    <linearGradient id="screenWork" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20293a"/>
      <stop offset="1" stop-color="#182130"/>
    </linearGradient>

    <!-- Right monitor: VibeWorld, deep space near-black -->
    <linearGradient id="screenVibe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070a16"/>
      <stop offset="1" stop-color="#04060e"/>
    </linearGradient>

    <!-- Glows -->
    <radialGradient id="cyanGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#00b4d8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vibeBleed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#12b8d8" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#ff00c8" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coldPool" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#aebfd6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#aebfd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="deskGlowVibe" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#7a3bff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globeBody" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#0e3b52"/>
      <stop offset="0.7" stop-color="#0a2436"/>
      <stop offset="1" stop-color="#06131f"/>
    </radialGradient>
    <radialGradient id="greenDot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7bffb0"/>
      <stop offset="0.4" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="globeClip"><circle cx="545" cy="182" r="40"/></clipPath>
    <clipPath id="vibeScreenClip"><rect x="480" y="114" width="208" height="160" rx="3"/></clipPath>
  </defs>

  <!-- Framed dark scene (works on light or dark GitHub pages) -->
  <rect x="0" y="0" width="800" height="450" rx="14" fill="url(#room)"/>
  <rect x="0.75" y="0.75" width="798.5" height="448.5" rx="13.5" fill="none" stroke="#2a3346" stroke-width="1.5"/>

  <!-- Faint stars on the back wall, denser on the VibeWorld side -->
  <g fill="#c7d4e8">
    <circle cx="120" cy="60" r="1" opacity="0.25"/>
    <circle cx="230" cy="40" r="1" opacity="0.18"/>
    <circle cx="70" cy="150" r="1" opacity="0.2"/>
    <circle cx="360" cy="55" r="1" opacity="0.15"/>
    <circle cx="560" cy="45" r="1.2" opacity="0.35"/>
    <circle cx="620" cy="70" r="1" opacity="0.3"/>
    <circle cx="700" cy="50" r="1.4" opacity="0.4"/>
    <circle cx="740" cy="120" r="1" opacity="0.3"/>
    <circle cx="660" cy="150" r="1.1" opacity="0.28"/>
    <circle cx="590" cy="95" r="1" opacity="0.22"/>
    <circle cx="500" cy="70" r="1" opacity="0.2"/>
  </g>

  <!-- Ambient bleed from the VibeWorld monitor into the room -->
  <ellipse cx="600" cy="200" rx="260" ry="230" fill="url(#vibeBleed)"/>

  <!-- ================= DESK ================= -->
  <polygon points="30,332 770,332 800,384 0,384" fill="url(#deskTop)"/>
  <polygon points="0,384 800,384 800,404 0,404" fill="url(#deskFront)"/>
  <line x1="30" y1="332" x2="770" y2="332" stroke="#2b3346" stroke-width="1" opacity="0.7"/>
  <!-- reflected pools of light on the desk -->
  <ellipse cx="225" cy="352" rx="120" ry="22" fill="url(#coldPool)"/>
  <ellipse cx="590" cy="356" rx="170" ry="30" fill="url(#deskGlowVibe)"/>

  <!-- ================= MONITOR 1 : WORK (left, ordinary) ================= -->
  <rect x="215" y="292" width="20" height="34" fill="#1a1e2a"/>
  <ellipse cx="225" cy="328" rx="42" ry="8" fill="#161a26"/>
  <rect x="120" y="112" width="210" height="182" rx="9" fill="url(#bezel)"/>
  <rect x="120.5" y="112.5" width="209" height="181" rx="8.5" fill="none" stroke="#39435a" stroke-width="1"/>
  <rect x="130" y="122" width="190" height="162" rx="4" fill="url(#screenWork)"/>
  <!-- title bar -->
  <rect x="130" y="122" width="190" height="18" rx="4" fill="#232d3f"/>
  <rect x="130" y="134" width="190" height="6" fill="#232d3f"/>
  <circle cx="142" cy="131" r="3" fill="#ff5f56"/>
  <circle cx="154" cy="131" r="3" fill="#ffbd2e"/>
  <circle cx="166" cy="131" r="3" fill="#27c93f"/>
  <text x="225" y="134.5" text-anchor="middle" font-size="8" fill="#6b7890">main.go</text>
  <!-- stylised code lines (muted, cold, no neon) -->
  <g fill-opacity="1">
    <rect x="140" y="150" width="10" height="5" rx="1.5" fill="#5b6b86"/>
    <rect x="154" y="150" width="46" height="5" rx="1.5" fill="#7e8ba6"/>
    <rect x="204" y="150" width="24" height="5" rx="1.5" fill="#49566e"/>

    <rect x="150" y="163" width="34" height="5" rx="1.5" fill="#6f7d99"/>
    <rect x="188" y="163" width="60" height="5" rx="1.5" fill="#49566e"/>

    <rect x="150" y="176" width="22" height="5" rx="1.5" fill="#8290ab"/>
    <rect x="176" y="176" width="30" height="5" rx="1.5" fill="#49566e"/>
    <rect x="210" y="176" width="42" height="5" rx="1.5" fill="#5b6b86"/>

    <rect x="160" y="189" width="52" height="5" rx="1.5" fill="#49566e"/>
    <rect x="216" y="189" width="20" height="5" rx="1.5" fill="#6f7d99"/>

    <rect x="150" y="202" width="40" height="5" rx="1.5" fill="#7e8ba6"/>
    <rect x="194" y="202" width="70" height="5" rx="1.5" fill="#49566e"/>

    <rect x="140" y="215" width="16" height="5" rx="1.5" fill="#5b6b86"/>
    <rect x="160" y="215" width="38" height="5" rx="1.5" fill="#49566e"/>

    <rect x="150" y="228" width="58" height="5" rx="1.5" fill="#6f7d99"/>
    <rect x="212" y="228" width="26" height="5" rx="1.5" fill="#49566e"/>

    <rect x="140" y="241" width="12" height="5" rx="1.5" fill="#5b6b86"/>
    <rect x="156" y="241" width="44" height="5" rx="1.5" fill="#7e8ba6"/>

    <rect x="150" y="254" width="30" height="5" rx="1.5" fill="#49566e"/>
    <rect x="184" y="254" width="48" height="5" rx="1.5" fill="#6f7d99"/>
  </g>
  <!-- cold cursor -->
  <rect x="234" y="253" width="6" height="7" fill="#aebfd6" opacity="0.85"/>

  <!-- ================= MONITOR 2 : VIBEWORLD (right, alive/neon) ================= -->
  <rect x="574" y="292" width="20" height="34" fill="#1a1e2a"/>
  <ellipse cx="584" cy="328" rx="46" ry="9" fill="#161a26"/>
  <!-- cyan glow radiating from the live screen -->
  <ellipse cx="584" cy="192" rx="185" ry="165" fill="url(#cyanGlow)" opacity="0.9"/>
  <rect x="470" y="104" width="228" height="190" rx="9" fill="url(#bezel)"/>
  <rect x="470.5" y="104.5" width="227" height="189" rx="8.5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.55"/>
  <rect x="480" y="114" width="208" height="160" rx="3" fill="url(#screenVibe)"/>

  <g clip-path="url(#vibeScreenClip)">
    <!-- title bar -->
    <rect x="480" y="114" width="208" height="17" fill="#0b1322"/>
    <circle cx="491" cy="122.5" r="3" fill="#ff5f56"/>
    <circle cx="502" cy="122.5" r="3" fill="#ffbd2e"/>
    <circle cx="513" cy="122.5" r="3" fill="#27c93f"/>
    <text x="584" y="125.5" text-anchor="middle" font-size="8" fill="#00e5ff" letter-spacing="1.5">V I B E W O R L D</text>

    <!-- starfield inside the screen -->
    <g fill="#9fe9ff">
      <circle cx="500" cy="150" r="1" opacity="0.5"/>
      <circle cx="640" cy="160" r="1" opacity="0.45"/>
      <circle cx="670" cy="210" r="1" opacity="0.4"/>
      <circle cx="505" cy="230" r="1" opacity="0.4"/>
      <circle cx="600" cy="255" r="1" opacity="0.35"/>
      <circle cx="490" cy="195" r="1" opacity="0.35"/>
    </g>

    <!-- Stargazer's comet, top-left of the screen -->
    <g stroke="#bff4ff" stroke-linecap="round">
      <line x1="497" y1="140" x2="513" y2="156" stroke-width="1.4" opacity="0.7"/>
    </g>
    <g fill="#eafcff">
      <path d="M515 158 l2.4 5.2 5.2 2.4 -5.2 2.4 -2.4 5.2 -2.4 -5.2 -5.2 -2.4 5.2 -2.4 Z"/>
    </g>
    <circle cx="515" cy="163" r="6" fill="url(#cyanGlow)"/>

    <!-- The glowing planet -->
    <circle cx="545" cy="182" r="46" fill="url(#cyanGlow)"/>
    <circle cx="545" cy="182" r="40" fill="url(#globeBody)"/>
    <g clip-path="url(#globeClip)" fill="#1b6d8a" opacity="0.85">
      <path d="M520 160 q14 -8 26 0 q6 12 -8 18 q-16 4 -20 -6 Z"/>
      <path d="M552 195 q16 -4 24 6 q-2 14 -18 12 q-14 -6 -6 -18 Z"/>
      <ellipse cx="527" cy="200" rx="9" ry="6"/>
    </g>
    <circle cx="545" cy="182" r="40" fill="none" stroke="#00e5ff" stroke-width="2"/>
    <circle cx="545" cy="182" r="40" fill="none" stroke="#bff4ff" stroke-width="0.6" opacity="0.8"/>

    <!-- Neon city skyline along the bottom -->
    <g>
      <rect x="486" y="248" width="14" height="26" fill="#3a1140"/>
      <rect x="486" y="248" width="14" height="3" fill="#ff00c8"/>
      <rect x="504" y="238" width="12" height="36" fill="#4a1250"/>
      <rect x="504" y="238" width="12" height="3" fill="#ff3ad6"/>
      <rect x="520" y="255" width="16" height="19" fill="#2a1550"/>
      <rect x="520" y="255" width="16" height="3" fill="#9a5bff"/>
      <rect x="556" y="252" width="12" height="22" fill="#3a1140"/>
      <rect x="556" y="252" width="12" height="3" fill="#ff00c8"/>
      <rect x="572" y="242" width="14" height="32" fill="#12314a"/>
      <rect x="572" y="242" width="14" height="3" fill="#00e5ff"/>
      <rect x="590" y="256" width="12" height="18" fill="#2a1550"/>
      <rect x="590" y="256" width="12" height="3" fill="#9a5bff"/>
      <rect x="606" y="246" width="14" height="28" fill="#3a1140"/>
      <rect x="606" y="246" width="14" height="3" fill="#ff3ad6"/>
      <rect x="624" y="252" width="12" height="22" fill="#12314a"/>
      <rect x="624" y="252" width="12" height="3" fill="#00e5ff"/>
      <rect x="640" y="240" width="14" height="34" fill="#4a1250"/>
      <rect x="640" y="240" width="14" height="3" fill="#ff00c8"/>
      <rect x="658" y="254" width="12" height="20" fill="#2a1550"/>
      <rect x="658" y="254" width="12" height="3" fill="#9a5bff"/>
      <rect x="674" y="248" width="12" height="26" fill="#12314a"/>
      <rect x="674" y="248" width="12" height="3" fill="#00e5ff"/>
    </g>
    <!-- lit windows -->
    <g fill="#ffe08a" opacity="0.9">
      <rect x="507" y="246" width="2" height="2"/>
      <rect x="511" y="252" width="2" height="2"/>
      <rect x="576" y="250" width="2" height="2"/>
      <rect x="580" y="258" width="2" height="2"/>
      <rect x="644" y="248" width="2" height="2"/>
      <rect x="648" y="256" width="2" height="2"/>
      <rect x="628" y="260" width="2" height="2"/>
    </g>
    <!-- neon street connecting the skyline -->
    <path d="M484 268 H688" stroke="#ff00c8" stroke-width="1" opacity="0.55"/>

    <!-- Chat window: "someone's online" companionship -->
    <rect x="612" y="140" width="72" height="40" rx="4" fill="#0a1526" stroke="#00e5ff" stroke-width="1" opacity="0.95"/>
    <circle cx="623" cy="151" r="5" fill="url(#greenDot)"/>
    <circle cx="623" cy="151" r="2.4" fill="#4ade80"/>
    <rect x="632" y="149" width="30" height="3" rx="1.5" fill="#8fb2c9"/>
    <rect x="620" y="160" width="52" height="3" rx="1.5" fill="#33506a"/>
    <rect x="620" y="167" width="38" height="3" rx="1.5" fill="#33506a"/>
    <rect x="620" y="174" width="30" height="3" rx="1.5" fill="#ff00c8" opacity="0.7"/>
  </g>

  <!-- ================= PERSON (silhouette, back to viewer, between monitors) ================= -->
  <!-- chair back -->
  <path d="M344 404 L344 320 Q344 306 358 306 L442 306 Q456 306 456 320 L456 404 Z" fill="#0c0f18"/>
  <!-- body -->
  <path d="M356 404 L360 322 Q362 296 400 292 Q438 296 440 322 L444 404 Z" fill="#080a12"/>
  <!-- head -->
  <circle cx="400" cy="266" r="25" fill="#080a12"/>
  <!-- neck -->
  <rect x="391" y="286" width="18" height="12" fill="#080a12"/>

  <!-- cold rim light on the left (from the work monitor) -->
  <path d="M377 250 A25 25 0 0 0 377 282" fill="none" stroke="#9fb4d0" stroke-width="1.6" opacity="0.55" stroke-linecap="round"/>
  <path d="M360 322 L356 404" fill="none" stroke="#8fa6c4" stroke-width="1.6" opacity="0.4" stroke-linecap="round"/>
  <!-- warm/neon rim light on the right (from the VibeWorld monitor) -->
  <path d="M423 250 A25 25 0 0 1 423 282" fill="none" stroke="#00e5ff" stroke-width="1.8" opacity="0.7" stroke-linecap="round"/>
  <path d="M440 322 L444 404" fill="none" stroke="#ff00c8" stroke-width="1.8" opacity="0.55" stroke-linecap="round"/>
  <path d="M438 300 Q446 310 447 330" fill="none" stroke="#00e5ff" stroke-width="1.4" opacity="0.45" stroke-linecap="round"/>
</svg>
